<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Olga Online English | Learn English with a Personal Teacher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #fbbf24;
      --bg: #0f172a;
      --card-bg: #0b1220;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --danger: #ef4444;
      --success: #22c55e;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.75);
      --shadow-card: 0 14px 35px rgba(15, 23, 42, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1d4ed8 0, #020617 45%, #000 100%);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* Layout */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: linear-gradient(to bottom, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.6));
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .nav {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #fbbf24, #2563eb 55%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.9), 0 0 25px rgba(59, 130, 246, 0.7);
    }

    .logo span {
      font-size: 15px;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .nav-links a {
      position: relative;
      padding-bottom: 4px;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, #fbbf24, #22c55e, #38bdf8);
      transition: width 0.25s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      border: 1px solid transparent;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .btn-outline {
      border-color: rgba(148, 163, 184, 0.5);
      color: var(--text-muted);
      background: rgba(15, 23, 42, 0.6);
    }

    .btn-outline:hover {
      border-color: rgba(248, 250, 252, 0.8);
      color: #f9fafb;
      background: rgba(15, 23, 42, 0.9);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #f9fafb;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.6);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(37, 99, 235, 0.8);
      background: linear-gradient(135deg, #1d4ed8, #4338ca);
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 26px 18px 60px;
    }

    /* Hero */
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 32px;
      align-items: center;
      margin-top: 18px;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .hero-tagline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.4);
      width: fit-content;
    }

    .hero-tagline span {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.2);
      color: #bfdbfe;
      border: 1px solid rgba(59, 130, 246, 0.6);
    }

    .hero-title {
      font-size: clamp(30px, 4vw, 40px);
      font-weight: 750;
      letter-spacing: 0.02em;
    }

    .hero-title span {
      background: linear-gradient(120deg, #fbbf24, #22c55e, #38bdf8);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-subtitle {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 520px;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 4px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .hero-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
    }

    .hero-right {
      position: relative;
    }

    .hero-card {
      background: radial-gradient(circle at top left, #1d4ed8 0, #020617 55%);
      border-radius: 26px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.35);
      position: relative;
      overflow: hidden;
    }

    .hero-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .teacher-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #fbbf24, #fb7185 40%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #0f172a;
      border: 2px solid rgba(15, 23, 42, 0.9);
    }

    .teacher-text {
      font-size: 12px;
    }

    .teacher-text strong {
      font-size: 13px;
    }

    .teacher-text span {
      display: block;
      color: #cbd5f5;
      font-size: 11px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(248, 250, 252, 0.12);
      font-size: 11px;
      color: var(--text-muted);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.35);
    }

    .hero-card-body {
      background: rgba(15, 23, 42, 0.85);
      border-radius: 18px;
      padding: 12px 12px 10px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      display: grid;
